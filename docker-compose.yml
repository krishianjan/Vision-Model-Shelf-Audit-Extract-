services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: kosha
      POSTGRES_PASSWORD: kosha
      POSTGRES_DB: kosha
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kosha"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
