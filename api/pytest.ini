[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Markers
markers =
    unit: fast tests using mocks only
    integration: slow tests using real images or external APIs

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Timeout (optional, requires pytest-timeout)
timeout = 300
